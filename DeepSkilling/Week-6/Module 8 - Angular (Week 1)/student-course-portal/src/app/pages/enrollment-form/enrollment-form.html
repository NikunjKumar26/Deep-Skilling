<h2>Enrollment Request (Template-Driven)</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
  
  <div>
    <label>Name:</label>
    <input type="text" name="studentName" [(ngModel)]="studentName" required minlength="3" #nameCtrl="ngModel">
    <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']" style="color: red;">Name is required.</span>
    <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']" style="color: red;">Name must be at least 3 characters.</span>
  </div>

  <div>
    <label>Email:</label>
    <input type="email" name="studentEmail" [(ngModel)]="studentEmail" required email #emailCtrl="ngModel">
    <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']" style="color: red;">Email is required.</span>
    <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']" style="color: red;">Must be a valid email.</span>
  </div>

  <div>
    <label>Course ID:</label>
    <input type="number" name="courseId" [(ngModel)]="courseId" required #courseCtrl="ngModel">
    <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']" style="color: red;">Course ID is required.</span>
  </div>

  <div>
    <label>Preferred Semester:</label>
    <select name="preferredSemester" [(ngModel)]="preferredSemester">
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <div>
    <label>
      <input type="checkbox" name="agreeToTerms" [(ngModel)]="agreeToTerms" required>
      I agree to terms
    </label>
  </div>

  <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
  <button type="button" (click)="enrollForm.resetForm()">Reset</button>

</form>

<div *ngIf="submitted" style="color: green; margin-top: 20px;">
  Enrollment request submitted successfully!
</div>
